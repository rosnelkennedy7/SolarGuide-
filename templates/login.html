<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — SolarGuide Bénin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --green-50:#f0fdf4;--green-100:#dcfce7;--green-200:#bbf7d0;
      --green-700:#15803d;--green-800:#166534;--green-900:#14532d;
      --orange-600:#ea580c;
      --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
      --gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-900:#0f172a;
    }
    body{font-family:"Inter",sans-serif;background:url('/static/img/drone.png') center/cover fixed;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;}
    body::before{content:'';position:fixed;inset:0;background:rgba(10,15,30,0.82);z-index:0;}
    body > *{position:relative;z-index:1;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes rotate{to{transform:rotate(360deg)}}
    @keyframes pulse-sun{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.1)}}
    @keyframes glow{0%,100%{opacity:.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:.6;transform:translate(-50%,-50%) scale(1.2)}}
    .card{background:rgba(255,255,255,0.09);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,0.15);border-radius:20px;width:100%;max-width:420px;padding:40px 36px;box-shadow:0 30px 80px rgba(0,0,0,.45);animation:fadeUp .4s ease;color:#fff}
    .logo-wrap{text-align:center;margin-bottom:30px}
    .sun-wrap{position:relative;width:64px;height:64px;margin:0 auto 14px;animation:float 3s ease-in-out infinite}
    .sun-halo{position:absolute;top:50%;left:50%;width:80px;height:80px;border-radius:50%;background:rgba(251,191,36,.15);transform:translate(-50%,-50%);animation:glow 2.5s ease-in-out infinite}
    .sun-rays{position:absolute;inset:0;animation:rotate 6s linear infinite}
    .ray{position:absolute;width:3px;height:9px;background:#fbbf24;border-radius:2px;left:50%;transform-origin:50% 220%}
    .sun-core{width:40px;height:40px;background:#f59e0b;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse-sun 2s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-size:18px;z-index:2}
    .logo-title{font-family:"Fraunces",serif;font-weight:800;font-size:26px;color:#fff}
    .logo-title .accent{color:#F5A623}
    .logo-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px}
    .form-group{margin-bottom:16px}
    label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.75);margin-bottom:6px}
    input[type=email],input[type=password],input[type=text]{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.2);border-radius:10px;padding:11px 14px;font-family:"Inter",sans-serif;font-size:14px;color:#fff;outline:none;transition:border-color .2s,box-shadow .2s}
    input[type=email]::placeholder,input[type=password]::placeholder,input[type=text]::placeholder{color:rgba(255,255,255,.4)}
    input:focus{border-color:#F5A623;box-shadow:0 0 0 3px rgba(245,166,35,.2)}
    .input-wrap{position:relative}
    .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:rgba(255,255,255,.5);padding:2px}
    .btn-login{width:100%;background:linear-gradient(135deg,#F5A623,#D47C0A);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:"Inter",sans-serif;transition:all .2s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(245,166,35,.4)}
    .btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:rgba(255,255,255,.3);font-size:12px}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.15)}
    .link-row{text-align:center;font-size:13px;color:rgba(255,255,255,.55)}
    .link-row a{color:#F5A623;font-weight:600;text-decoration:none}
    .link-row a:hover{text-decoration:underline}
    .alert{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px;display:none;gap:8px;align-items:flex-start}
    .alert-error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);color:#fca5a5}
    .alert-success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.35);color:#86efac}
    .alert.show{display:flex}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
    .attempts-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin-top:6px;overflow:hidden}
    .attempts-fill{height:100%;border-radius:2px;background:#EF4444;transition:width .3s}
    .back-link{text-align:center;margin-top:20px}
    .back-link a{font-size:12px;color:rgba(255,255,255,.5);text-decoration:none}
    .back-link a:hover{color:#fff}
  </style>
</head>
<body>
  <div style="width:100%;max-width:420px">
    <div class="card">

      <div class="logo-wrap">
        <div class="sun-wrap">
          <div class="sun-halo"></div>
          <div class="sun-rays">
            <div class="ray" style="transform:rotate(0deg) translateX(-50%)"></div>
            <div class="ray" style="transform:rotate(45deg) translateX(-50%)"></div>
            <div class="ray" style="transform:rotate(90deg) translateX(-50%)"></div>
            <div class="ray" style="transform:rotate(135deg) translateX(-50%)"></div>
            <div class="ray" style="transform:rotate(180deg) translateX(-50%)"></div>
            <div class="ray" style="transform:rotate(225deg) translateX(-50%)"></div>
            <div class="ray" style="transform:rotate(270deg) translateX(-50%)"></div>
            <div class="ray" style="transform:rotate(315deg) translateX(-50%)"></div>
          </div>
          <div class="sun-core">☀️</div>
        </div>
        <div class="logo-title"><span class="accent">Solar</span>Guide</div>
        <div class="logo-sub">🇧🇯 Dimensionnement solaire PV · Bénin</div>
      </div>

      <div class="alert alert-error" id="alert-error"></div>
      <div class="alert alert-success" id="alert-success"></div>

      <form id="login-form" onsubmit="soumettre(event)">
        <div class="form-group">
          <label for="email">Adresse email</label>
          <input type="email" id="email" placeholder="votre@email.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePw()" id="toggle-btn">👁️</button>
          </div>
          <div id="attempts-wrap" style="display:none">
            <div class="attempts-bar"><div class="attempts-fill" id="attempts-fill" style="width:0%"></div></div>
            <div style="font-size:11px;color:#dc2626;margin-top:3px" id="attempts-text"></div>
          </div>
        </div>

        <button class="btn-login" type="submit" id="btn-submit">
          <span id="btn-text">Se connecter</span>
        </button>
      </form>

      <div class="divider">ou</div>

      <div class="link-row">
        Pas encore de compte ?
        <a href="/register">Créer un compte gratuitement</a>
      </div>
    </div>

    <div class="back-link">
      <a href="/">← Retour à l'accueil public</a>
    </div>
  </div>

  <script>
    let tentatives = 0;

    function togglePw() {
      const inp = document.getElementById('password');
      const btn = document.getElementById('toggle-btn');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }

    function afficherAlerte(type, msg) {
      ['alert-error','alert-success'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('show');
        el.innerHTML = '';
      });
      const el = document.getElementById('alert-' + type);
      el.innerHTML = (type === 'error' ? '⚠️ ' : '✅ ') + msg;
      el.classList.add('show');
    }

    async function soumettre(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      const btnText = document.getElementById('btn-text');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btnText.innerHTML = '<div class="spinner"></div>&nbsp;Connexion...';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email, password})
        });
        const data = await res.json();

        if (data.succes) {
          afficherAlerte('success', 'Connexion réussie ! Redirection en cours...');
          setTimeout(() => { window.location.href = data.redirect; }, 800);
        } else {
          tentatives++;
          afficherAlerte('error', data.erreur || 'Erreur de connexion.');

          if (tentatives >= 2) {
            document.getElementById('attempts-wrap').style.display = 'block';
            const pct = Math.min((tentatives / 5) * 100, 100);
            document.getElementById('attempts-fill').style.width = pct + '%';
            const restantes = Math.max(0, 5 - tentatives);
            document.getElementById('attempts-text').textContent =
              restantes > 0
                ? restantes + ' tentative(s) restante(s) avant blocage'
                : 'Compte bloqué. Contactez l\'administrateur.';
          }

          btn.disabled = false;
          btnText.textContent = 'Se connecter';
        }
      } catch {
        afficherAlerte('error', 'Erreur réseau. Vérifiez votre connexion.');
        btn.disabled = false;
        btnText.textContent = 'Se connecter';
      }
    }
  </script>
</body>
</html>
